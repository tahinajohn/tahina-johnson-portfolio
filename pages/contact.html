<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <!-- Anti-flash: apply theme before render -->
  <script>
    (function(){
      var m = localStorage.getItem('portfolio-color-mode');
      if (!m) m = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-color-mode', m);
    })();
  </script>
</head>
<body data-theme="contact">

  <main class="page-main">
    <div class="container">

      <!-- HEADER -->
      <div class="page-header reveal">
        <div class="page-header-meta">
          <span class="section-index">07</span>
          <span class="page-breadcrumb" data-i18n="contact.breadcrumb"></span>
        </div>
        <h1 class="page-title" data-i18n="contact.title"></h1>
        <div class="page-title-line"></div>
      </div>

      <!-- TOP ROW: CTA left + Social bento right -->
      <div class="ct-layout reveal">

        <!-- ══ LEFT — CTA + Direct contacts ══ -->
        <div class="ct-left">
          <div class="ct-cta-wrap">
            <p class="ct-eyebrow" data-i18n="contact.eyebrow"></p>
            <h2 class="ct-heading" data-i18n="contact.heading"></h2>
            <p class="ct-sub" data-i18n="contact.sub"></p>
            <p class="ct-fun" data-i18n="contact.fun"></p>

            <!-- Direct contact chips -->
            <div class="ct-direct">
              <!-- Email -->
              <a href="mailto:tahina021@example.com" class="ct-chip ct-chip--email">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="4" width="20" height="16" rx="2"/>
                  <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                </svg>
                <span>tahina021@example.com</span>
              </a>
              <!-- WhatsApp -->
              <a href="https://wa.me/+261387331111" target="_blank" rel="noopener" class="ct-chip ct-chip--whatsapp">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
                </svg>
                <span>+261 38 73 311 11</span>
              </a>
            </div>

            <!-- CV Download -->
            <a href="../assets/cv.pdf" download class="ct-cv-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              <span data-i18n="contact.cv_btn"></span>
            </a>

            <!-- Status pill -->
            <div class="ct-status">
              <span class="ct-status-dot"></span>
              <span data-i18n="contact.status"></span>
            </div>
          </div>
        </div>

        <!-- ══ RIGHT — Bento social grid ══ -->
        <div class="ct-right">

          <!-- LinkedIn -->
          <a href="https://linkedin.com/in/tahina-johnson" target="_blank" rel="noopener"
            class="ct-card ct-card--linkedin">
            <div class="ct-card-icon">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
              </svg>
            </div>
            <div class="ct-card-body">
              <p class="ct-card-name">LinkedIn</p>
              <p class="ct-card-handle" data-i18n="contact.linkedin_handle"></p>
            </div>
            <span class="ct-card-arrow">↗</span>
          </a>

          <!-- GitHub -->
          <a href="https://github.com/tahinajohn" target="_blank" rel="noopener"
            class="ct-card ct-card--github">
            <div class="ct-card-icon">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
              </svg>
            </div>
            <div class="ct-card-body">
              <p class="ct-card-name">GitHub</p>
              <p class="ct-card-handle">@tahinajohn</p>
            </div>
            <span class="ct-card-arrow">↗</span>
          </a>

          <!-- Facebook -->
          <a href="https://facebook.com/johnson.andrianjaka" target="_blank" rel="noopener"
            class="ct-card ct-card--facebook">
            <div class="ct-card-icon">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
              </svg>
            </div>
            <div class="ct-card-body">
              <p class="ct-card-name">Facebook</p>
              <p class="ct-card-handle" data-i18n="contact.fb_handle"></p>
            </div>
            <span class="ct-card-arrow">↗</span>
          </a>

          <!-- Chess.com -->
          <a href="https://chess.com/member/ratah001" target="_blank" rel="noopener"
            class="ct-card ct-card--chess">
            <div class="ct-card-icon">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8zm0 8c1.1 0 2 .9 2 2v1l2 3H8l2-3v-1c0-1.1.9-2 2-2zm-4 8h8l1 2H7l1-2z"/>
              </svg>
            </div>
            <div class="ct-card-body">
              <p class="ct-card-name">Chess.com</p>
              <p class="ct-card-handle" data-i18n="contact.chess_handle"></p>
            </div>
            <span class="ct-card-arrow">♟</span>
          </a>

        </div><!-- /ct-right -->

      </div><!-- /ct-layout -->

      <!-- ══ CONTACT FORM (full width below) ══ -->
      <div class="ct-form-section reveal">
        <div class="ct-form-header">
          <h2 class="ct-form-title" data-i18n="contact.form_title"></h2>
          <p class="ct-form-sub" data-i18n="contact.form_sub"></p>
        </div>

        <div class="ct-form-card">
          <form class="ct-form" id="contactForm" onsubmit="handleFormSubmit(event)">
            <div class="ct-form-row">
              <div class="ct-field">
                <label class="ct-label" for="ct-name" data-i18n="contact.field_name"></label>
                <input
                  type="text" id="ct-name" name="name"
                  class="ct-input" required
                  data-i18n-placeholder="contact.placeholder_name"
                />
              </div>
              <div class="ct-field">
                <label class="ct-label" for="ct-email" data-i18n="contact.field_email"></label>
                <input
                  type="email" id="ct-email" name="email"
                  class="ct-input" required
                  data-i18n-placeholder="contact.placeholder_email"
                />
              </div>
            </div>
            <div class="ct-field">
              <label class="ct-label" for="ct-message" data-i18n="contact.field_message"></label>
              <textarea
                id="ct-message" name="message"
                class="ct-input ct-textarea" required rows="5"
                data-i18n-placeholder="contact.placeholder_message"
              ></textarea>
            </div>
            <div class="ct-form-footer">
              <p class="ct-form-note" data-i18n="contact.form_note"></p>
              <button type="submit" class="ct-submit-btn" id="ctSubmit">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="22" y1="2" x2="11" y2="13"/>
                  <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
                <span data-i18n="contact.form_send"></span>
              </button>
            </div>
          </form>

          <!-- Success message -->
          <div class="ct-success" id="ctSuccess" style="display:none">
            <div class="ct-success-icon">✓</div>
            <p class="ct-success-text" data-i18n="contact.form_success"></p>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <span class="footer-logo"><span class="logo-bracket">[</span>TJ<span class="logo-bracket">]</span></span>
      <span class="footer-copy" data-i18n="footer.copy"></span>
    </div>
  </footer>

  <script src="../js/i18n.js"></script>
  <script src="../js/nav.js"></script>
  <script>
    injectNav('contact');

    /* Form: opens mailto with prefilled fields */
    function handleFormSubmit(e) {
      e.preventDefault();
      const name    = document.getElementById('ct-name').value.trim();
      const email   = document.getElementById('ct-email').value.trim();
      const message = document.getElementById('ct-message').value.trim();
      const subject = encodeURIComponent('Message depuis votre portfolio — ' + name);
      const body    = encodeURIComponent(
        'Nom : ' + name + '\nEmail : ' + email + '\n\n' + message
      );
      window.location.href = 'mailto:tahina021@gmail@example.com?subject=' + subject + '&body=' + body;

      /* Show success state */
      document.getElementById('contactForm').style.display = 'none';
      const success = document.getElementById('ctSuccess');
      success.style.display = 'flex';
      setTimeout(() => {
        success.style.display  = 'none';
        document.getElementById('contactForm').style.display = 'flex';
        document.getElementById('contactForm').reset();
      }, 4000);
    }

    /* Apply placeholders from i18n */
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key  = el.getAttribute('data-i18n-placeholder');
        const lang = typeof getLang === 'function' ? getLang() : 'en';
        const keys = key.split('.');
        let val = TRANSLATIONS[lang];
        keys.forEach(k => { if (val) val = val[k]; });
        if (val) el.setAttribute('placeholder', val);
      });
    });

    document.addEventListener('langchange', () => {
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key  = el.getAttribute('data-i18n-placeholder');
        const lang = typeof getLang === 'function' ? getLang() : 'en';
        const keys = key.split('.');
        let val = TRANSLATIONS[lang];
        keys.forEach(k => { if (val) val = val[k]; });
        if (val) el.setAttribute('placeholder', val);
      });
    });
  </script>
</body>
</html>
