<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
  <title>Chat — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/chat.css" />
  <!-- Anti-flash: apply theme before render -->
  <script>
    (function(){
      var m = localStorage.getItem('portfolio-color-mode');
      if (!m) m = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-color-mode', m);
    })();
  </script>
</head>
<body data-theme="chat">

  <!-- Nav injected by nav.js -->

  <!-- ══ CHAT SHELL (full-height, outside page-main) ══ -->
  <div class="ch-shell" id="chShell">

    <!-- Page header (fades out on active) -->
    <div class="ch-page-header" id="chPageHeader">
      <div class="ch-page-header-meta">
        <span class="section-index">06</span>
        <span class="ch-page-breadcrumb" data-i18n="chat.breadcrumb"></span>
      </div>
      <h1 class="ch-page-title" data-i18n="chat.title"></h1>
      <div class="ch-page-title-line"></div>
    </div>

    <!-- ── IDLE STATE: centered welcome + input ── -->
    <div class="ch-idle" id="chIdle">
      <div class="ch-idle-inner">

        <!-- Avatar + welcome text -->
        <div class="ch-avatar-wrap">
          <div class="ch-avatar">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a10 10 0 0 1 10 10c0 5.52-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2z"/>
              <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
              <line x1="9" y1="9" x2="9.01" y2="9"/>
              <line x1="15" y1="9" x2="15.01" y2="9"/>
            </svg>
          </div>
          <div class="ch-avatar-ring"></div>
        </div>

        <p class="ch-welcome" id="chWelcomeText"></p>

        <!-- Suggestion chips -->
        <div class="ch-suggestions" id="chSuggestions"></div>

        <!-- Input form (idle) -->
        <form class="ch-form ch-form--idle" id="chForm" onsubmit="handleSend(event)">
          <div class="ch-input-wrap">
            <input
              type="text"
              id="chInput"
              class="ch-input"
              autocomplete="off"
              data-i18n-placeholder="chat.placeholder"
            />
            <button type="submit" class="ch-send-btn" id="chSendBtn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </form>

      </div>
    </div>

    <!-- ── ACTIVE STATE: conversation + sticky input ── -->
    <div class="ch-active" id="chActive" aria-hidden="true">

      <!-- Scrollable history -->
      <div class="ch-history" id="chHistory"></div>

      <!-- Sticky bottom input -->
      <div class="ch-sticky-bar" id="chStickyBar">
        <div class="ch-sticky-inner">
          <form class="ch-form ch-form--sticky" onsubmit="handleSend(event)">
            <div class="ch-input-wrap">
              <input
                type="text"
                id="chInputSticky"
                class="ch-input"
                autocomplete="off"
                data-i18n-placeholder="chat.placeholder"
              />
              <button type="submit" class="ch-send-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="22" y1="2" x2="11" y2="13"/>
                  <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
              </button>
            </div>
          </form>
        </div>
      </div>

    </div>

  </div><!-- /ch-shell -->

  <script src="../js/i18n.js"></script>
  <script src="../js/nav.js"></script>
  <script src="../js/chat.js"></script>
  <script>
    injectNav('chat');
    initChat();
  </script>
</body>
</html>
